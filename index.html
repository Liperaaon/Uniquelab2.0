<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | UNIQUELAB</title>
    
    <!-- Carrega o Tailwind CSS para o design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Mapeamento de Módulos (Permite ao navegador importar o React e o Firebase via Internet) -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.294.0?deps=react@18.2.0",
            "firebase/app": "https://esm.sh/firebase@10.7.1/app",
            "firebase/auth": "https://esm.sh/firebase@10.7.1/auth",
            "firebase/firestore": "https://esm.sh/firebase@10.7.1/firestore"
        }
    }
    </script>
    
    <!-- Carrega o Babel (O tradutor que converte JSX em algo que o navegador entende) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- É aqui dentro que o Painel vai aparecer -->
    <div id="root"></div>

    <!-- O nosso código React entra aqui (note o type="text/babel") -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          LayoutDashboard, Phone, Mail, MapPin, MousePointer2, 
          Users, Save, CheckCircle2, TrendingUp, AlertCircle, 
          Lock, LogOut, KeyRound, ShieldCheck, Megaphone, Download,
          Smartphone, Monitor, Loader2, FileText, UserCircle, ExternalLink, Briefcase
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, setDoc, onSnapshot, getDoc, collection } from 'firebase/firestore';

// --- INICIALIZAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "SUA_API_KEY_AQUI",
            authDomain: "seu-projeto.firebaseapp.com",
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "123456789",
            appId: "SEU_APP_ID"
        };
        
        let app, auth, db;
        // ... (o resto do código continua igual)
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) {
            console.warn("Aviso: Para o painel guardar dados, precisa configurar a variável firebaseConfig acima.");
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'uniquelab-admin-local';

        // --- O COMPONENTE PRINCIPAL (O NOSSO PAINEL) ---
        function App() {
          const [user, setUser] = useState(null);
          const [isInitializing, setIsInitializing] = useState(true);
          
          const [stats, setStats] = useState({ page_view: 0, click_whatsapp: 0, click_results: 0 });
          const [settings, setSettings] = useState({ phone: '', email: '', address: '', hero_title: '', hero_subtitle: '', hero_desc: '', instagram: '' });
          const [logs, setLogs] = useState([]);
          const [resumes, setResumes] = useState([]);
          
          const [activeTab, setActiveTab] = useState('dashboard');
          const [saving, setSaving] = useState(false);
          const [message, setMessage] = useState(null);

          useEffect(() => {
            if(!auth) {
                setIsInitializing(false);
                return;
            }
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (error) {
                console.error("Erro na autenticação:", error);
                setIsInitializing(false);
              }
            };
            initAuth();

            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              setUser(currentUser);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user || !db) return;

            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'uniquelab', 'settings');
            const statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'uniquelab', 'stats');
            const logsRef = doc(db, 'artifacts', appId, 'public', 'data', 'uniquelab', 'logs');
            const resumesRef = collection(db, 'artifacts', appId, 'public', 'data', 'resumes');

            const unsubSettings = onSnapshot(settingsRef, (docSnap) => {
              if (docSnap.exists()) setSettings(prev => ({ ...prev, ...docSnap.data() }));
              setIsInitializing(false);
            }, () => setIsInitializing(false));

            const unsubStats = onSnapshot(statsRef, (docSnap) => {
              if (docSnap.exists()) setStats(prev => ({ ...prev, ...docSnap.data() }));
            });

            const unsubLogs = onSnapshot(logsRef, (docSnap) => {
              if (docSnap.exists() && docSnap.data().entries) setLogs(docSnap.data().entries);
            });

            const unsubResumes = onSnapshot(resumesRef, (snapshot) => {
              const resumesList = [];
              snapshot.forEach((doc) => resumesList.push({ id: doc.id, ...doc.data() }));
              resumesList.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
              setResumes(resumesList);
            });

            return () => {
              unsubSettings(); unsubStats(); unsubLogs(); unsubResumes();
            };
          }, [user]);

          const handleSaveSettings = async (e) => {
            e.preventDefault();
            if (!user || !db) return;
            setSaving(true);
            try {
              const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'uniquelab', 'settings');
              await setDoc(settingsRef, settings, { merge: true });
              setMessage({ type: 'success', text: 'Alterações guardadas com sucesso!' });
            } catch (error) {
              setMessage({ type: 'error', text: 'Erro ao guardar as alterações.' });
            }
            setSaving(false);
            setTimeout(() => setMessage(null), 3000);
          };

          const exportLogs = () => {
            const csvContent = "data:text/csv;charset=utf-8," 
              + "Data,Evento,Dispositivo\n"
              + logs.map(l => `${new Date(l.timestamp).toLocaleString()},${l.type},${l.userAgent}`).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "relatorio_uniquelab.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          if (isInitializing) {
            return (
              <div className="min-h-screen bg-[#020617] flex items-center justify-center p-6">
                <Loader2 className="w-8 h-8 text-[#C5A059] animate-spin" />
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-sans flex flex-col">
              <nav className="bg-[#020617] text-white p-4 sticky top-0 z-50 flex justify-between items-center px-4 md:px-8 border-b border-white/5">
                <div className="flex items-center gap-8">
                  <span className="font-bold tracking-tighter text-lg hidden md:block">UNIQUELAB <span className="text-[#C5A059] font-light italic text-sm ml-1">ADMIN</span></span>
                  <div className="flex overflow-x-auto gap-1 w-full md:w-auto pb-2 md:pb-0" style={{ scrollbarWidth: 'none' }}>
                    {['dashboard', 'resumes', 'settings', 'marketing'].map(tab => (
                      <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all whitespace-nowrap ${activeTab === tab ? 'bg-[#C5A059] text-[#020617]' : 'text-slate-400 hover:text-white'}`}>
                        {tab === 'dashboard' ? 'Métricas' : tab === 'resumes' ? 'Currículos' : tab === 'settings' ? 'Contactos' : 'Marketing'}
                      </button>
                    ))}
                  </div>
                </div>
              </nav>

              <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-10">
                {activeTab === 'dashboard' && (
                  <div className="space-y-8 animate-in fade-in duration-500">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                      <div>
                        <h2 className="text-2xl font-bold">Dashboard em Tempo Real</h2>
                        <p className="text-slate-500 text-sm italic">Dados sincronizados com a base de dados.</p>
                      </div>
                      <button onClick={exportLogs} className="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-slate-50 transition-all shadow-sm">
                        <Download size={14}/> Exportar CSV
                      </button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      <StatCard label="Acessos Totais" value={stats.page_view} color="blue" icon={<Users/>}/>
                      <StatCard label="Leads WhatsApp" value={stats.click_whatsapp} color="green" icon={<Phone/>}/>
                      <StatCard label="Resultados" value={stats.click_results} color="amber" icon={<MousePointer2/>}/>
                    </div>
                  </div>
                )}
                
                {activeTab === 'resumes' && (
                  <div className="space-y-8 animate-in fade-in duration-500">
                    <div>
                      <h2 className="text-2xl font-bold">Banco de Talentos</h2>
                      <p className="text-slate-500 text-sm">Currículos recebidos através da página Trabalhe Conosco.</p>
                    </div>
                    {resumes.length > 0 ? (
                      <div className="grid grid-cols-1 gap-6">
                        {resumes.map(resume => (
                          <div key={resume.id} className="bg-white p-6 md:p-8 rounded-[2rem] border border-slate-200 shadow-sm relative overflow-hidden">
                            <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-[#C5A059]"></div>
                            <div className="flex flex-col md:flex-row justify-between gap-6">
                              <div className="space-y-4 flex-1">
                                <div className="flex items-center gap-4">
                                  <div className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400"><UserCircle size={28} /></div>
                                  <div>
                                    <h3 className="text-lg font-bold text-slate-900">{resume.name || 'Candidato Anónimo'}</h3>
                                    <p className="text-[10px] font-bold text-[#C5A059] uppercase tracking-widest">{resume.area || 'Área não especificada'}</p>
                                  </div>
                                </div>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="bg-white rounded-[2rem] border border-slate-200 py-20 flex flex-col items-center justify-center text-center px-4">
                        <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-4 text-slate-300"><Briefcase size={32} /></div>
                        <h3 className="text-xl font-bold text-slate-800 mb-2">Nenhum Currículo Recebido</h3>
                      </div>
                    )}
                  </div>
                )}

                {activeTab === 'settings' && (
                  <div className="max-w-xl mx-auto animate-in fade-in">
                    <h2 className="text-2xl font-bold mb-8 text-center">Contactos Institucionais</h2>
                    <form onSubmit={handleSaveSettings} className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-200 space-y-6">
                      <InputField label="WhatsApp" value={settings.phone} onChange={v => setSettings({...settings, phone: v})} />
                      <InputField label="E-mail" value={settings.email} onChange={v => setSettings({...settings, email: v})} />
                      <div className="space-y-2 text-left">
                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Endereço Completo</label>
                        <textarea value={settings.address || ''} onChange={e => setSettings({...settings, address: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-sm outline-none focus:border-[#C5A059] transition-all min-h-[100px]" />
                      </div>
                      {message && <Alert message={message}/>}
                      <button disabled={saving} className="w-full bg-[#020617] text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-[10px] hover:bg-[#C5A059] hover:text-[#020617] transition-all flex items-center justify-center gap-2">
                        {saving ? 'A Guardar...' : 'Guardar Alterações'}
                      </button>
                    </form>
                  </div>
                )}

                {activeTab === 'marketing' && (
                  <div className="max-w-xl mx-auto animate-in fade-in">
                    <h2 className="text-2xl font-bold mb-8 text-center">Textos do Website</h2>
                    <form onSubmit={handleSaveSettings} className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-200 space-y-6">
                      <InputField label="Título Principal (Hero)" value={settings.hero_title} onChange={v => setSettings({...settings, hero_title: v})} />
                      <InputField label="Subtítulo Principal" value={settings.hero_subtitle} onChange={v => setSettings({...settings, hero_subtitle: v})} />
                      <div className="space-y-2 text-left">
                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Descrição Inicial</label>
                        <textarea value={settings.hero_desc || ''} onChange={e => setSettings({...settings, hero_desc: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-sm outline-none focus:border-[#C5A059] min-h-[100px]" />
                      </div>
                      <InputField label="Link do Instagram (Opcional)" value={settings.instagram} onChange={v => setSettings({...settings, instagram: v})} placeholder="https://instagram.com/..." />
                      {message && <Alert message={message}/>}
                      <button disabled={saving} className="w-full bg-[#020617] text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-[10px] hover:bg-[#C5A059] hover:text-[#020617] transition-all flex items-center justify-center gap-2">
                        {saving && <Loader2 size={14} className="animate-spin" />}
                        {saving ? 'A Guardar...' : 'Guardar Alterações'}
                      </button>
                    </form>
                  </div>
                )}
              </main>
            </div>
          );
        }

        const StatCard = ({ label, value, color, icon }) => (
          <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm group hover:border-[#C5A059]/30 transition-all">
            <div className={`w-10 h-10 rounded-xl flex items-center justify-center mb-4 ${
              color === 'blue' ? 'bg-blue-50 text-blue-500' : color === 'green' ? 'bg-green-50 text-green-500' : 'bg-amber-50 text-amber-500'
            }`}>{icon}</div>
            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{label}</p>
            <p className="text-3xl font-bold mt-1 tracking-tighter">{value || 0}</p>
          </div>
        );

        const InputField = ({ label, value, onChange, placeholder }) => (
          <div className="space-y-2 text-left">
            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{label}</label>
            <input type="text" value={value || ''} onChange={e => onChange(e.target.value)} placeholder={placeholder} className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm outline-none focus:border-[#C5A059] transition-all" />
          </div>
        );

        const Alert = ({ message }) => (
          <div className={`p-4 rounded-2xl flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest border ${
            message.type === 'success' ? 'bg-green-50 text-green-700 border-green-100' : 'bg-red-50 text-red-700 border-red-100'
          }`}>
            <AlertCircle size={14}/> {message.text}
          </div>
        );

        // Renderiza a Aplicação
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
